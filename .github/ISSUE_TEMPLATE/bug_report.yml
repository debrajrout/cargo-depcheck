name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. Include what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Steps to reproduce, ideally the exact `cargo depcheck` command you ran.
      placeholder: |
        1. `cd my-project`
        2. `cargo depcheck --some-flag`
        3. See error
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste the terminal output, error message, or report. This will be rendered as a code block.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: cargo-depcheck version
      description: Output of `cargo depcheck --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — Cargo.lock size, workspace setup, network/proxy quirks, etc.
    validations:
      required: false
