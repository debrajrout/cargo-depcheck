name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that cargo-depcheck doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? A new flag, a change to the ranking algorithm, new output format, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other tools that solve part of this.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Example command/output you'd expect, links to similar features in other tools, etc.
    validations:
      required: false
